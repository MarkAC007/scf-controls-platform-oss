name: Bug report
description: Report something that is broken in the SCF Controls Platform
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Please do **not** report security vulnerabilities here — see our [Security Policy](../../security/policy) instead.
  - type: input
    id: version
    attributes:
      label: Platform version
      description: Which release snapshot are you running? (e.g. the release tag, or the value shown in the app footer/about)
      placeholder: "e.g. v1.4.0"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      description: How are you running the platform?
      options:
        - Docker Compose
        - Other (please describe in "What happened")
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual behaviour
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be rendered as code, so no need for backticks. Please redact any secrets.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched the existing issues and this has not already been reported.
          required: true
