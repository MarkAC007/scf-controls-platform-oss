name: OSV-Scanner

# Enumerates known-vulnerable dependencies (OSV database) across all lockfiles and
# surfaces them in the Security tab via SARIF. Advisory: vulnerabilities do not fail
# the build (continue-on-error) so the SARIF always uploads — triage happens in the
# Security tab and via Renovate's vulnerability-fix PRs. See OpenSSF Scorecard issue #8.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF to code scanning
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run osv-scanner
        uses: google/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --format=sarif
            --output=osv-results.sarif
            --recursive
            ./
        continue-on-error: true

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: osv-results.sarif
        continue-on-error: true
