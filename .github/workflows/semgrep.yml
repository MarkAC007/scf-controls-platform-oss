name: Semgrep SAST

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

# Minimum default scope; the job escalates only to upload SARIF.
permissions:
  contents: read

jobs:
  semgrep:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF to code scanning
    container:
      image: semgrep/semgrep  # returntocorp/semgrep is deprecated

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep-results.sarif
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true
