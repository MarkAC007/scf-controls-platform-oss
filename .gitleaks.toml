# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "CCF Controls Platform Gitleaks Config"

# Extend the default gitleaks config
[extend]
useDefault = true

# Global allowlist configuration
[allowlist]
description = "Allowlist for documentation and placeholder patterns"

# Allowlist paths that contain example/documentation content
# These files contain curl examples with placeholder tokens (YOUR_TOKEN, YOUR_API_KEY)
# which trigger false positives on the curl-auth-header rule.
# backend/data/system_catalog/ holds curated evidence-collection guidance —
# vendor API hostnames/endpoints in prose trip generic-api-key.
paths = [
    '''docs-site/src/content/docs/.*\.md$''',
    '''docs/.*\.md$''',
    '''backend/data/system_catalog/.*\.json$''',
]

# Allowlist specific patterns that are clearly placeholders
regexes = [
    '''YOUR_TOKEN''',
    '''YOUR_API_KEY''',
    '''your-api-key''',
    '''your_api_key''',
    '''your-secure-password''',
    '''your_secure_password''',
]
