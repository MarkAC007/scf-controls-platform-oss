# Pre-commit Configuration for Security Scanning
# Catches secrets and issues BEFORE they're committed
#
# Usage:
#   1. Copy to .pre-commit-config.yaml in your repo root
#   2. Run: pip install pre-commit && pre-commit install
#   3. Commits will now be scanned automatically

repos:
  # Gitleaks - Secret Detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=20000']  # 20MB - accommodates SCF data files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
        args: ['--unsafe']  # Allow custom tags
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Python repos: Add these hooks
  # - repo: https://github.com/astral-sh/ruff-pre-commit
  #   rev: v0.1.9
  #   hooks:
  #     - id: ruff
  #       args: [--fix]
  #     - id: ruff-format

  # TypeScript/Node repos: Add these hooks
  # - repo: https://github.com/pre-commit/mirrors-eslint
  #   rev: v8.56.0
  #   hooks:
  #     - id: eslint
  #       files: \.[jt]sx?$
  #       types: [file]

# Exclude patterns
exclude: |
  (?x)^(
    .*\.min\.js|
    .*\.min\.css|
    node_modules/|
    \.git/|
    dist/|
    build/|
    __pycache__/
  )$
