# Alembic Configuration for CG SCF Backend
# Async SQLAlchemy migration management

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
# Using timestamp prefix for better ordering
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Prepend sys.path so imports work correctly
prepend_sys_path = .

# Timezone for migration timestamps (UTC for consistency)
timezone = UTC

# Max length for slug field
truncate_slug_length = 40

# Use os.pathsep for version path separator
version_path_separator = os

# Output encoding for revision files
output_encoding = utf-8

# Database URL - overridden by env.py from environment variable
# This is a placeholder for offline mode only
sqlalchemy.url = postgresql+asyncpg://odin:changeme@localhost:5432/odin_scf


[post_write_hooks]
# Format migration files with black if available
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
