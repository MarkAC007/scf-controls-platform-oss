services:
  postgres:
    image: postgres:15-alpine
    container_name: cg-scf-postgres
    environment:
      POSTGRES_DB: cg_scf
      POSTGRES_USER: cg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init-db.sql disabled - using Alembic migrations instead
      # - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      # Loopback-only by default: the app talks to postgres over the internal
      # docker network, so the host publish exists purely for local admin tools.
      # Publishing 5432 to all interfaces on a shared/remote host is needless
      # attack surface. POSTGRES_PORT only changes the loopback port; for
      # remote DB access you must change the bind address via a
      # docker-compose.override.yml overlay (see UPGRADING.md).
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cg -d cg_scf"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cg-network

  redis:
    image: redis:7-alpine
    container_name: cg-scf-redis
    # No port mapping - only accessible within Docker network (more secure)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cg-network

  # Self-hosted, S3-compatible object storage for evidence files. Ships by
  # default so the platform needs no AWS/Azure account. API on :9000, web
  # console on :9001 (login with MINIO_ROOT_USER / MINIO_ROOT_PASSWORD).
  minio:
    image: minio/minio:latest
    container_name: cg-scf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      # Host side is remappable: another service may already own 9000/9001 on
      # your host. If you remap MINIO_PORT, EVIDENCE_PUBLIC_ENDPOINT follows
      # automatically for same-machine installs (see backend service).
      - "${MINIO_PORT:-9000}:9000"           # S3 API (presigned upload/download URLs)
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # web console
    volumes:
      - minio_data:/data
    networks:
      - cg-network
    restart: unless-stopped

  # One-shot: wait for MinIO, then create the evidence bucket if absent.
  # Exits 0 once done; `docker compose up` runs it automatically.
  minio-init:
    image: minio/mc:latest
    container_name: cg-scf-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      EVIDENCE_BUCKET: ${EVIDENCE_BUCKET:-evidence}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" >/dev/null 2>&1; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/\"$$EVIDENCE_BUCKET\";
      echo \"bucket ready: $$EVIDENCE_BUCKET\";
      "
    networks:
      - cg-network

  backend:
    # Default: pull the pre-built image published from the private canonical repo
    # (see .github/workflows/publish-oss-images.yml). Contributors can still build from
    # source with `docker compose build` / `docker compose up --build`.
    # Tag is intentionally tunable (SCF_IMAGE_TAG, default `latest`) rather than a pinned
    # digest — friendlier default for a quickstart; set SCF_IMAGE_TAG=sha-<commit> (or a
    # digest) for reproducible/locked pulls.
    image: ghcr.io/markac007/scf-backend:${SCF_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BUILD_STAMP: "${BUILD_STAMP:-dev}"
        MIN_UPGRADABLE_VERSION: "${MIN_UPGRADABLE_VERSION:-0.0.0}"
    container_name: cg-scf-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://cg:${DB_PASSWORD}@postgres:5432/cg_scf
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Second origin follows a remapped FRONTEND_PORT; override wholesale for
      # remote-host deploys where the browser origin isn't localhost.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:${FRONTEND_PORT:-5173}}
      RATE_LIMITING_ENABLED: "false"  # Temporarily disabled - needs debugging
      LOG_LEVEL: ${LOG_LEVEL}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Version info (fallbacks - actual versions read from package.json and git)
      PLATFORM_VERSION: ${PLATFORM_VERSION:-0.0.0}
      CATALOG_VERSION: ${CATALOG_VERSION:-unknown}
      # Platform upgrade system (see .env.example). SCF_UPDATE_CHECK opts OUT of
      # the daily GitHub update poll (default ON). SCF_MIGRATE_ACK is the backup
      # acknowledgement escape hatch for the backend migration guard.
      SCF_UPDATE_CHECK: ${SCF_UPDATE_CHECK:-true}
      SCF_MIGRATE_ACK: ${SCF_MIGRATE_ACK:-}
      # Authentication (set these in .env file - REQUIRED)
      API_KEY: ${API_KEY}
      # Self-hosted single-tenant mode: when truthy (see .env.example), grants the
      # master API_KEY admin on the single org. Leave UNSET for multi-tenant/SaaS. (#662)
      OSS_SINGLE_TENANT: ${OSS_SINGLE_TENANT:-}
      GOOGLE_AUTH_ENABLED: ${GOOGLE_AUTH_ENABLED}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # OIDC / bundled identity provider (optional — see the "idp" compose profile
      # and .env.example). Empty by default so the no-profile stack is unchanged;
      # set OIDC_* to point at the bundled Keycloak or any external OIDC provider.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      # Email notifications (optional - set in .env file)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      APP_URL: ${APP_URL}
      # Evidence storage — defaults to the bundled MinIO (S3-compatible) so the
      # stack is self-contained with no cloud account. Point AWS_* at real S3
      # (and clear AWS_ENDPOINT_URL), or set AZURE_STORAGE_* instead, to use a
      # managed backend. EVIDENCE_PUBLIC_ENDPOINT is the URL browsers use for
      # presigned upload/download (AWS_ENDPOINT_URL is the internal one).
      EVIDENCE_BUCKET: ${EVIDENCE_BUCKET:-evidence}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL-http://minio:9000}
      EVIDENCE_PUBLIC_ENDPOINT: ${EVIDENCE_PUBLIC_ENDPOINT-http://localhost:${MINIO_PORT:-9000}}
      # Azure Blob Storage (set these for Azure deployments)
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-}
      EVIDENCE_CONTAINER: ${EVIDENCE_CONTAINER:-evidence}
    ports:
      # Host side is remappable (BACKEND_PORT) — 8000 is a popular default and
      # may already be taken on your host.
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./webclient/public/data:/app/data/json:ro
      # Platform version read dynamically from package.json (mounted outside /app
      # to avoid conflicts). Catalogue version comes from the CATALOG_VERSION env
      # var (see .env.example); the old ./catalog git-submodule mounts are not used
      # in this Docker-only release — get_catalog_version() falls back to the env var.
      - ./webclient/package.json:/version/package.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - cg-network
    restart: unless-stopped

  celery-worker:
    # Shares the backend image (same Dockerfile.backend); only the command differs.
    image: ghcr.io/markac007/scf-backend:${SCF_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BUILD_STAMP: "${BUILD_STAMP:-dev}"
        MIN_UPGRADABLE_VERSION: "${MIN_UPGRADABLE_VERSION:-0.0.0}"
    container_name: cg-scf-celery-worker
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q default,high_priority,low_priority,tprm_research,dpsia,evidence_assessment,evidence_window,evidence_composite,cdm,catalog
    environment:
      DATABASE_URL: postgresql+asyncpg://cg:${DB_PASSWORD}@postgres:5432/cg_scf
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOG_LEVEL: ${LOG_LEVEL}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Self-hosted single-tenant guard for the live catalogue-import task (#660).
      # The catalog.import task refuses to reseed unless this is truthy.
      OSS_SINGLE_TENANT: ${OSS_SINGLE_TENANT:-}
      # Update poller opt-out (default ON) — the worker runs the beat-scheduled
      # tasks_updates.check_latest_release task.
      SCF_UPDATE_CHECK: ${SCF_UPDATE_CHECK:-true}
      # OIDC / bundled identity provider (optional — mirrors the backend service).
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      # Vendor research API keys (Issue #59)
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-1}
      # Evidence storage — defaults to the bundled MinIO (see backend service)
      EVIDENCE_BUCKET: ${EVIDENCE_BUCKET:-evidence}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL-http://minio:9000}
      EVIDENCE_PUBLIC_ENDPOINT: ${EVIDENCE_PUBLIC_ENDPOINT-http://localhost:${MINIO_PORT:-9000}}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-}
      EVIDENCE_CONTAINER: ${EVIDENCE_CONTAINER:-evidence}
      # AI Assessment (Anthropic Claude)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Application Insights (telemetry)
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    volumes:
      - ./backend:/app
      # Live catalogue import (catalog.import task): the worker needs the SCF
      # extractor, and must write the generated seeder JSON to the SAME host dir
      # the backend reads from (so an uploaded SCF .xlsx seeds the running app).
      - ./scripts:/app/scripts:ro
      - ./webclient/public/data:/app/data/json
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - cg-network
    restart: unless-stopped
    # Override the inherited backend-image healthcheck (HTTP probe to :8000) —
    # the worker serves no HTTP, so that check can never pass. Mirrors the
    # proven ECS worker check (terraform-aws/ecs-celery.tf).
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery-beat:
    # Shares the backend image (same Dockerfile.backend); only the command differs.
    image: ghcr.io/markac007/scf-backend:${SCF_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BUILD_STAMP: "${BUILD_STAMP:-dev}"
        MIN_UPGRADABLE_VERSION: "${MIN_UPGRADABLE_VERSION:-0.0.0}"
    container_name: cg-scf-celery-beat
    # Explicit --schedule path: without it, beat writes its schedule shelve into
    # the working dir /app — but /app is the bind-mounted ./backend, owned by
    # whoever cloned the repo on the host, while the image runs as apiuser
    # (uid 1001). On any clone not owned by uid 1001 (the common case) beat
    # crash-loops with "Permission denied: 'celerybeat-schedule'". /tmp is
    # always writable in-container; the schedule state is derived timing data
    # that beat rebuilds safely from celery_app config if lost on recreate.
    command: celery -A celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://cg:${DB_PASSWORD}@postgres:5432/cg_scf
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOG_LEVEL: ${LOG_LEVEL}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Update poller opt-out (default ON). Beat reads this at import time to
      # decide whether to schedule the daily update-check-daily entry.
      SCF_UPDATE_CHECK: ${SCF_UPDATE_CHECK:-true}
      # OIDC / bundled identity provider (optional — mirrors the backend service).
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cg-network
    restart: unless-stopped
    # Override the inherited backend-image healthcheck (HTTP probe to :8000) —
    # beat serves no HTTP. `pgrep` is NOT in the image (python:3.11-slim, no
    # procps), so probe PID 1's cmdline directly: liveness = the beat process
    # is still the container's main process.
    healthcheck:
      test: ["CMD-SHELL", "grep -q beat /proc/1/cmdline || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # One-shot SCF catalogue importer — "bring your own SCF Excel" install step.
  # Not part of the normal stack (profile: init), so `docker compose up` never starts it.
  # Run once after supplying your SCF .xlsx:
  #   docker compose --profile init run --rm catalog-importer
  # It extracts the catalogue into webclient/public/data/*.json (mounted here at /app/data/json),
  # which the backend mounts read-only and seeds into the DB on startup.
  # The repo ships the importer code ONLY — SCF catalogue content is licensed; bring your own.
  catalog-importer:
    build:
      context: .
      dockerfile: Dockerfile.importer
    container_name: cg-scf-catalog-importer
    profiles:
      - init
    volumes:
      # Your SCF workbook (override path with SCF_XLSX in .env); read-only.
      - ${SCF_XLSX:-./catalog-source/scf.xlsx}:/input/scf.xlsx:ro
      # Generated JSON lands alongside the curated (non-SCF) catalogue files.
      - ./webclient/public/data:/app/data/json
    networks:
      - cg-network

  # ==========================================================================
  # BUNDLED IDENTITY PROVIDER (Keycloak) — OPTIONAL, compose profile "idp".
  # Nothing below starts with a plain `docker compose up`; you must opt in with
  #   docker compose --profile idp up -d
  # Bring-your-own external OIDC provider instead? Skip the profile and just set
  # OIDC_* in .env (the backend reads them regardless of this profile).
  # ==========================================================================

  # One-shot: Keycloak stores its tables in the EXISTING postgres, but it does
  # NOT create its own schema. Create it (idempotently) before Keycloak boots.
  keycloak-schema-init:
    image: postgres:15-alpine
    container_name: cg-scf-keycloak-schema-init
    profiles:
      - idp
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # PGPASSWORD keeps the secret out of the process argv (vs. embedding it in a URL).
      PGPASSWORD: ${DB_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      psql -h postgres -U cg -d cg_scf -c 'CREATE SCHEMA IF NOT EXISTS keycloak';
      echo 'keycloak schema ready';
      "
    networks:
      - cg-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: cg-scf-keycloak
    profiles:
      - idp
    # Production mode (`start`, not `start-dev`) with HTTP enabled for the internal
    # docker network. --import-realm loads idp/scf-realm.json on boot.
    # NOTE: the admin creds are validated at RUNTIME by the entrypoint guard below,
    # NOT via compose `${VAR:?}` interpolation. Compose interpolates every service
    # in the file regardless of active profiles, so a `:?` here would break the
    # DEFAULT `docker compose up` for anyone who hasn't set the idp vars. The bash
    # `${VAR:?}` in the entrypoint fails loudly only when this service is started.
    # $$ escapes to a literal $ so bash (not compose) evaluates these guards at
    # runtime — same $$VAR escaping the minio-init service uses above.
    entrypoint:
      - /bin/bash
      - -c
      - |
        : "$${KC_BOOTSTRAP_ADMIN_USERNAME:?KC_ADMIN_USER is required when using --profile idp}"
        : "$${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD is required when using --profile idp}"
        exec /opt/keycloak/bin/kc.sh start --import-realm
    environment:
      # Keycloak 26 renamed KEYCLOAK_ADMIN* -> KC_BOOTSTRAP_ADMIN*. Empty defaults
      # keep the default (no-profile) stack parseable; the entrypoint guard above
      # enforces they are non-empty when the idp profile actually runs.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-}
      # Store realm/user data in the EXISTING postgres, in a dedicated schema.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/cg_scf
      KC_DB_USERNAME: cg
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KC_HTTP_ENABLED: "true"
      # Hostname v2 config. For MVP we pin a hostname URL + relax strict checks so
      # the dev stack boots over plain HTTP. PRODUCTION behind a reverse proxy:
      # set KC_HOSTNAME to the public https URL and add KC_PROXY_HEADERS=xforwarded.
      # Default follows a remapped KEYCLOAK_PORT (same auto-follow pattern as
      # EVIDENCE_PUBLIC_ENDPOINT/MINIO_PORT). Set KC_HOSTNAME explicitly for
      # remote hosts / reverse proxies.
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:${KEYCLOAK_PORT:-8081}}
      KC_HOSTNAME_STRICT: "false"
      # Exposes /health/* on the management port (9000) for the healthcheck below.
      KC_HEALTH_ENABLED: "true"
    ports:
      # 8081 because 8000 (backend) and 5173 (frontend) are already taken on host.
      # Host side is remappable (KEYCLOAK_PORT); KC_HOSTNAME's default follows it.
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./idp/scf-realm.json:/opt/keycloak/data/import/scf-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-schema-init:
        condition: service_completed_successfully
    # The KC 26 distroless image has no curl/wget, so probe the management health
    # port with the shell's built-in /dev/tcp (the image's /bin/sh is bash on ubi9).
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -qs '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - cg-network
    restart: unless-stopped

  # One-shot: after Keycloak is healthy, inject the client secret from env (so it
  # never lives in the realm JSON) and, if BOOTSTRAP_ADMIN_EMAIL is set, create
  # the first admin user with a random temp password printed once to these logs.
  idp-init:
    image: quay.io/keycloak/keycloak:26.3
    container_name: cg-scf-idp-init
    profiles:
      - idp
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      # Empty defaults keep the default (no-profile) stack parseable; idp-init.sh
      # asserts these are non-empty at runtime and exits loudly if not.
      KC_ADMIN_USER: ${KC_ADMIN_USER:-}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
    entrypoint: ["/bin/bash", "/idp-init.sh"]
    volumes:
      - ./idp/idp-init.sh:/idp-init.sh:ro
    networks:
      - cg-network
    restart: "no"

  frontend:
    # NOT switched to a published image yet — OPEN DECISION (see PR).
    # This service is the Vite DEV server (Dockerfile.frontend.dev, port 5173, build-time
    # VITE args). The published `ghcr.io/markac007/scf-frontend` image is PROD nginx
    # (Dockerfile.frontend, port 80, runtime BACKEND_URL, Google-auth disabled). Swapping
    # requires a deliberate prod-frontend service (different port + runtime env), not a
    # one-line image: swap. Left on build until the OSS-frontend shape is decided.
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
      args:
        # No VITE_API_URL needed - uses relative URLs
        VITE_GOOGLE_AUTH_ENABLED: ${VITE_GOOGLE_AUTH_ENABLED}
        # Issue #699: redirect-based OIDC sign-in (bundled Keycloak or BYO IdP)
        VITE_OIDC_ENABLED: ${VITE_OIDC_ENABLED:-false}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_API_KEY: ${VITE_API_KEY}
    container_name: cg-scf-frontend
    ports:
      # Host side is remappable (FRONTEND_PORT) if 5173 is taken on your host.
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - cg-network
    restart: unless-stopped

volumes:
  postgres_data:
    name: cg-scf-postgres-data
  redis_data:
    name: cg-scf-redis-data
  minio_data:
    name: cg-scf-minio-data

networks:
  cg-network:
    name: cg-scf-network
    driver: bridge
