# Nginx configuration for CG CCF Frontend
# Optimized for Docker deployment

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-component text/x-cross-domain-policy;

    # Security headers
    # X-Frame-Options removed to allow Google Sign-In iframe
    # Use CSP frame-ancestors instead for better control

    # Comprehensive Content-Security-Policy
    # Note: Adjust script-src and style-src based on your application's specific needs
    # Consider using nonces or hashes instead of 'unsafe-inline' for production
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://apis.google.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.*.amazonaws.com https://*.blob.core.windows.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection header removed (deprecated, replaced by CSP)
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # HSTS: Instructs browsers to always use HTTPS for this domain.
    # Even though TLS terminates at the ALB/Cloudflare layer, the HSTS header
    # is passed through to the browser and prevents SSL stripping attacks.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain always;

            # Re-declare security headers from http block
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://apis.google.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.*.amazonaws.com https://*.blob.core.windows.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        # API proxy - proxy all /api/* requests to backend
        # BACKEND_URL is substituted at runtime via envsubst (becomes literal URL)
        # IMPORTANT: Backend routes are at /api/* so we keep the /api prefix
        location /api/ {
            # Proxy to backend /api/ path
            # After envsubst: proxy_pass https://backend.run.app/api/;
            proxy_pass $BACKEND_URL/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS is handled by FastAPI backend with strict origin allowlist
            # Do NOT handle preflight here - it bypasses backend CORS validation
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;

            # Re-declare security headers from http block
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://apis.google.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.*.amazonaws.com https://*.blob.core.windows.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        # Cache JSON data files (CCF data)
        location /data/ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate" always;

            # Re-declare security headers from http block
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://apis.google.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.*.amazonaws.com https://*.blob.core.windows.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        # Single Page Application routing
        # All routes should serve index.html
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;

            # Re-declare security headers from http block
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://apis.google.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.*.amazonaws.com https://*.blob.core.windows.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        # Security: Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
