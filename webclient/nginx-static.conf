server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://apis.google.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.*.amazonaws.com https://*.blob.core.windows.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml;

    # Health check endpoint (required for load balancer)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain always;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;

        # Re-add security headers (nginx location blocks override parent)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache JSON data files
    location /data/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # SPA routing - all other routes serve index.html
    # This allows React Router to handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;

        # Don't cache index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://apis.google.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.*.amazonaws.com https://*.blob.core.windows.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
